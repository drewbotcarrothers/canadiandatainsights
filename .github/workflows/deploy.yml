name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Build Static Site
        run: npm run build

      - name: Pre-deploy FTP Cleanup (Hostinger Temporary Files)
        env:
          FTP_HOST: ${{ secrets.FTP_ADDRESS }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          npm install basic-ftp
          node -e "
            const ftp = require('basic-ftp');
            async function clean() {
                const client = new ftp.Client();
                try {
                    await client.access({
                        host: process.env.FTP_HOST,
                        user: process.env.FTP_USER,
                        password: process.env.FTP_PASS,
                        secure: 'implicit'
                    }).catch(() => client.access({
                        host: process.env.FTP_HOST,
                        user: process.env.FTP_USER,
                        password: process.env.FTP_PASS,
                        secure: false
                    }));
                    await client.remove('location/cowansville/.in.index.txt.').catch(() => {});
                    await client.remove('location/cowansville/.in.index.html.').catch(() => {});
                    // Add ontario just in case it got stuck too
                    await client.remove('location/ontario/.in.index.txt.').catch(() => {});
                    await client.remove('location/ontario/.in.index.html.').catch(() => {});
                    console.log('Successfully cleaned stuck Hostinger .in files');
                } catch(err) {
                    console.log('Cleanup caught error (safe to ignore):', err.message);
                }
                client.close();
            }
            clean();
          "

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_ADDRESS }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./out/
          server-dir: ./
